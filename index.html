<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mivtza Display</title>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: black; overflow: hidden; font-family: sans-serif; }
    .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; transition: opacity 1.5s ease-in-out; }
    .hidden { opacity: 0; z-index: 0; pointer-events: none; }
    .visible { opacity: 1; z-index: 1; pointer-events: auto; }
    #clock-container { position: absolute; top: 20px; left: 20px; z-index: 100; background: rgba(0,0,0,0.6); color: white; padding: 10px 20px; border-radius: 10px; backdrop-filter: blur(5px); }
  </style>
</head>
<body>

  <div id="clock-container"><span id="time"></span></div>

  <iframe id="dashboard" class="screen visible" src="https://rabbibergstein-hub.github.io/Mivtza-Yedios-Klaliyos-Dashboard/index.html"></iframe>
  <iframe id="slides" class="screen hidden" src=""></iframe>

  <script>
    const slideBaseUrl = "https://docs.google.com/presentation/d/e/2PACX-1vSO-qw-BQKFidxCH7uLWlgC0vHbd-0S_PTECGZJwqzy0xl9Q_FqjuY-FqYs5-IB6ZjvEHhjD2Q_ekjt/embed?";
    let currentSlide = 1;
    const totalSlides = 15; 
    let showingDashboard = true;

    function rotate() {
      const db = document.getElementById("dashboard");
      const sl = document.getElementById("slides");

      if (showingDashboard) {
        // Switch to Slides
        sl.src = `${slideBaseUrl}slide=${currentSlide}`;
        db.className = "screen hidden";
        sl.className = "screen visible";
        showingDashboard = false;
        console.log("Showing Slide: " + currentSlide);
      } else {
        // Switch to Dashboard
        currentSlide = (currentSlide % totalSlides) + 1; // Prepare next slide for later
        db.className = "screen visible";
        sl.className = "screen hidden";
        showingDashboard = true;
        console.log("Showing Dashboard");
      }
    }

    function updateClock() {
      const now = new Date();
      document.getElementById("time").textContent = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
    }

    window.onload = () => {
      setInterval(rotate, 20000);
      setInterval(updateClock, 1000);
      updateClock();
    };
  </script>
</body>
</html>
