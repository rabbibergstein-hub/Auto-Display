<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mivtza Display</title>

  <style>
    html, body {
      margin: 0; padding: 0; height: 100%;
      background: black; overflow: hidden;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    .screen {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%; border: none;
      transition: opacity 1.5s ease-in-out;
    }

    .hidden { opacity: 0; z-index: 0; pointer-events: none; }
    .visible { opacity: 1; z-index: 1; pointer-events: auto; }

    #slides-mask {
      position: absolute; bottom: 0; left: 0;
      width: 100%; height: 35px; background: black;
      z-index: 50; transition: opacity 1.5s ease-in-out;
    }

    #clock-container {
      position: absolute; top: 30px; left: 30px; z-index: 100;
      background: rgba(15, 15, 15, 0.75); color: white;
      padding: 15px 25px; border-radius: 16px;
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.8);
      display: flex; align-items: baseline; gap: 10px; pointer-events: none;
    }

    #clock-time { font-size: 3.5rem; font-weight: 700; letter-spacing: -1px; line-height: 1; }
    #clock-ampm { font-size: 1.2rem; text-transform: uppercase; font-weight: 600; opacity: 0.8; }
  </style>

  <script>
    // --- CONFIGURATION ---
    const slideBaseUrl = "https://docs.google.com/presentation/d/e/2PACX-1vSO-qw-BQKFidxCH7uLWlgC0vHbd-0S_PTECGZJwqzy0xl9Q_FqjuY-FqYs5-IB6ZjvEHhjD2Q_ekjt/embed?";
    const totalSlides = 15; // Set this to the total number of slides in your deck
    
    let currentMode = "dashboard"; 
    let lastSlideViewed = 1;

    function rotate() {
      const dashboard = document.getElementById("dashboard");
      const slides = document.getElementById("slides");
      const mask = document.getElementById("slides-mask");

      if (currentMode === "dashboard") {
        // Prepare the slide URL with the "bookmark"
        slides.src = slideBaseUrl + "slide=" + lastSlideViewed;

        // Show Slides
        dashboard.className = "screen hidden";
        slides.className = "screen visible";
        mask.style.opacity = "1";
        currentMode = "slides";
      } else {
        // Bookmark the NEXT slide before hiding
        lastSlideViewed = (lastSlideViewed % totalSlides) + 1;

        // Show Dashboard
        dashboard.className = "screen visible";
        slides.className = "screen hidden";
        mask.style.opacity = "0";
        currentMode = "dashboard";
      }
    }

    function updateClock() {
      const timeElement = document.getElementById("clock-time");
      const ampmElement = document.getElementById("clock-ampm");
      const now = new Date();
      let hours = now.getHours();
      const minutes = String(now.getMinutes()).padStart(2, '0');
      const ampm = hours >= 12 ? 'PM' : 'AM';
      hours = hours % 12 || 12;
      timeElement.textContent = `${hours}:${minutes}`;
      ampmElement.textContent = ampm;
    }

    window.onload = function() {
      updateClock();
      setInterval(updateClock, 1000);
      setInterval(rotate, 20000); // Switch every 20 seconds
    };
  </script>
</head>

<body>
  <div id="clock-container">
    <span id="clock-time">12:00</span>
    <span id="clock-ampm">AM</span>
  </div>

  <div id="slides-mask" style="opacity:0"></div>

  <iframe id="dashboard" class="screen visible" src="https://rabbibergstein-hub.github.io/Mivtza-Yedios-Klaliyos-Dashboard/"></iframe>
  
  <iframe id="slides" class="screen hidden" src=""></iframe>
</body>
</html>
